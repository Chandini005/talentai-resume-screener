{% extends 'resume_screener/base.html' %}
{% block title %}Not Found{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;max-width:420px">
    <div style="font-size:5rem;font-weight:900;color:var(--muted);font-family:var(--mono);line-height:1">404</div>
    <h1 style="font-size:1.4rem;font-weight:700;margin:1rem 0 .5rem">Page Not Found</h1>
    <p style="color:var(--muted);margin-bottom:1.5rem">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="{% url 'landing' %}" class="btn-teal">
      <i class="bi bi-house"></i>Go Home
    </a>
  </div>
</div>
{% endblock %}
