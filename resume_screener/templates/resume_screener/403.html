{% extends 'resume_screener/base.html' %}
{% block title %}Access Denied{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;max-width:420px">
    <div style="font-size:5rem;font-weight:900;color:var(--rose);font-family:var(--mono);line-height:1">403</div>
    <h1 style="font-size:1.4rem;font-weight:700;margin:1rem 0 .5rem">Access Denied</h1>
    <p style="color:var(--muted);margin-bottom:1.5rem">
      You don't have permission to access this page.
      This area may be restricted to a different account role.
    </p>
    <a href="{% url 'dashboard' %}" class="btn-teal">
      <i class="bi bi-arrow-left"></i>Back to Dashboard
    </a>
  </div>
</div>
{% endblock %}
